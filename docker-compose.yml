version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quickdelivery}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quickdelivery}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qd-network

  # Redis Cache & Sessions
  redis:
    image: redis:7-alpine
    container_name: qd-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - qd-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: qd-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-quickdelivery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - qd-network

  # Customer Frontend
  customer-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        BUILD_PATH: frontend/customer
        REACT_APP_API_URL: ${CUSTOMER_API_URL:-http://localhost:3000/api/v1}
        REACT_APP_WS_URL: ${CUSTOMER_WS_URL:-ws://localhost:3000}
    container_name: qd-customer-app
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${CUSTOMER_API_URL:-http://localhost:3000/api/v1}
      - REACT_APP_WS_URL=${CUSTOMER_WS_URL:-ws://localhost:3000}
    ports:
      - "${CUSTOMER_PORT:-3001}:80"
    depends_on:
      - backend
    networks:
      - qd-network

  # Restaurant Frontend
  restaurant-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        BUILD_PATH: frontend/restaurant
        REACT_APP_API_URL: ${RESTAURANT_API_URL:-http://localhost:3000/api/v1}
        REACT_APP_WS_URL: ${RESTAURANT_WS_URL:-ws://localhost:3000}
    container_name: qd-restaurant-app
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${RESTAURANT_API_URL:-http://localhost:3000/api/v1}
      - REACT_APP_WS_URL=${RESTAURANT_WS_URL:-ws://localhost:3000}
    ports:
      - "${RESTAURANT_PORT:-3002}:80"
    depends_on:
      - backend
    networks:
      - qd-network

  # Admin Frontend
  admin-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        BUILD_PATH: frontend/admin
        REACT_APP_API_URL: ${ADMIN_API_URL:-http://localhost:3000/api/v1}
    container_name: qd-admin-app
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - REACT_APP_API_URL=${ADMIN_API_URL:-http://localhost:3000/api/v1}
    ports:
      - "${ADMIN_PORT:-3003}:80"
    depends_on:
      - backend
    networks:
      - qd-network

  # Nginx Reverse Proxy (Optional - for production use)
  nginx:
    image: nginx:alpine
    container_name: qd-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - customer-app
      - restaurant-app
      - admin-app
    networks:
      - qd-network

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  qd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
